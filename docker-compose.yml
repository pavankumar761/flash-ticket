
services:
  # ---------------- MYSQL ----------------
  mysql-db:
    image: mysql:8.4
    container_name: flashticket-mysql
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flashticket_db
    # Critical for Debezium CDC support
    command: >
      --gtid-mode=ON 
      --enforce-gtid-consistency=ON 
      --log-bin=binlog 
      --binlog-format=ROW 
      --server-id=1
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - flashticket-network

  # ---------------- REDIS ----------------
  redis-cache:
    image: redis:7.0-alpine
    container_name: flashticket-redis
    networks:
      - flashticket-network
    ports:
      - "6379:6379"

  # ---------------- ZOOKEEPER ----------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: flashticket-zookeeper
    networks:
      - flashticket-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # ---------------- KAFKA ----------------
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: flashticket-kafka
    networks:
      - flashticket-network
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ---------------- KAFKA CONNECT (CDC) ----------------
  debezium:
    image: debezium/connect:2.7.3.Final
    container_name: flashticket-debezium
    networks:
      - flashticket-network
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
    depends_on:
      - kafka
      - mysql-db

  # ---------------- ElasticSearch ----------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: flashticket-elastic
    networks:
      - flashticket-network
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------- Kibana ----------------
  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: flashticket-kibana
    networks:
      - flashticket-network
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  flashticket-network:
    driver: bridge

volumes:
  mysql_data: